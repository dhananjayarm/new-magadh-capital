<header>
    <div id="hw-hero">
    <div id="page-header" class="contact">
        <div class="title-breadcrumbs">
               <div class="caption-box"> 
            <h1>INVESTOR ASSISTANCE</h1>
               </div>
        </div>
    </div>
</div>
</header>
 
<div class="row" id="assistance-content">
    <div class="col-sm-12 normaltabs tabs-top-horizontal my-3">
        <!-- <nav aria-label="Investor Assistance Tabs"> -->
        <ul
            class="nav nav-tabs"
            id="assistances"
            role="tablist"
            style="position: relative; z-index: 2">
            <!-- <li
                class="nav-item"
                role="presentation"
                [class.active]="activeTab === 'login'">
                <a
                    class="nav-link"
                    id="tab-style-tab"
                    [routerLink]="[]"
                    data-bs-toggle="tab"
                    href="#login"
                    fragment="login"
                    role="tab"
                    aria-controls="tab-style"
                    aria-selected="true">Login
                </a>
            </li> -->
            <li
                class="nav-item"
                role="presentation"
                [class.active]="activeTab === 'invest'">
                <button
                    class="nav-link"
                    id="tab-invest-tab"
                    data-bs-toggle="tab"
                    [routerLink]="[]"
                    href="#invest"
                    fragment="invest"
                    role="tab"
                    type="button"
                    [attr.tabindex]="activeTab === 'invest' ? '0' : '-1'"
                    [attr.aria-selected]="activeTab === 'invest'"
                    aria-controls="tab-invest"
                    (click)="activeTab='invest'"
                     >How to Invest with us</button>
            </li>
            <li
                class="nav-item"
                role="presentation"
                [class.active]="activeTab === 'download'">
                <button
                    class="nav-link"
                    id="tab-download-tab"
                    [routerLink]="[]"
                    data-bs-toggle="tab"
                    href="#download"
                    role="tab"
                    aria-controls="tab-download"
                       [attr.tabindex]="activeTab === 'download' ? '0' : '-1'"
                    [attr.aria-selected]="activeTab === 'download'"
                     (click)="activeTab='download'"
                    fragment="download">Downloads</button>
            </li>
            <li
                class="nav-item"
                role="presentation"
                [class.active]="activeTab === 'complaints'">
                <button
                    class="nav-link"
                    id="tab-complaints-tab"
                    [routerLink]="[]"
                    data-bs-toggle="tab"
                    href="#complaints"
                    role="tab"
                    aria-controls="tab-complaints"
                     [attr.tabindex]="activeTab === 'complaints' ? '0' : '-1'"
                    [attr.aria-selected]="activeTab === 'complaints'"
                     (click)="activeTab='complaints'"
                    fragment="complaints">Grievances</button>
            </li>
            <li
                class="nav-item"
                role="presentation"
                [class.active]="activeTab === 'FAQ'">
                <button
                    class="nav-link"
                    id="tab-FAQ-tab"
                    [routerLink]="[]"
                    data-bs-toggle="tab"
                    href="#FAQ"
                    role="tab"
                    aria-controls="tab-FAQ"
                     [attr.tabindex]="activeTab === 'FAQ' ? '0' : '-1'"
                    [attr.aria-selected]="activeTab === 'FAQ'"
                     (click)="activeTab='FAQ'"
                    fragment="FAQ">FAQ</button>
            </li>
        </ul>
        <!-- </nav> -->
        <main id="main-content">
 
        <div class="tab-content">
            <div class="tab-pane fade in"  id="tab-login">
                <app-login-in
                    *ngIf="activeTab === 'login'"
                    [class.active]="activeTab === 'login'"
                    [class.show]="activeTab === 'login'"></app-login-in>
            </div>
            <div
                class="tab-pane"
                id="tab-invest"
                [class.active]="activeTab === 'invest'"
                [class.show]="activeTab === 'invest'"
                *ngIf="activeTab === 'invest'">
                <app-how-to-invest-with-us></app-how-to-invest-with-us>
            </div>
            <app-downloads 
            id="tab-download"
                *ngIf="activeTab === 'download'"
                [class.active]="activeTab === 'download'"
                [class.show]="activeTab === 'download'"></app-downloads>
            <app-grievances id="tab-complaints"
                *ngIf="activeTab === 'complaints'"
                [class.active]="activeTab === 'complaints'"
                [class.show]="activeTab === 'complaints'"></app-grievances>
            <app-faqs
                *ngIf="activeTab === 'FAQ'"
                [class.active]="activeTab === 'FAQ'"
                [class.show]="activeTab === 'FAQ'"></app-faqs>
        </div>
        </main>
    </div>
</div>
